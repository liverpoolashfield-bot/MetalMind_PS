{% extends "base.html" %}
{% block title %}Settings - MetalMind PS{% endblock %}
{% block content %}
<h2 class="mb-4">Account Settings</h2>
<div class="card">
    <div class="card-body">
        <ul class="nav nav-pills mb-3" id="settingsTab" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#profile">Profile</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#security">Security</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#notifications">Notifications</button></li>
        </ul>
        <div class="tab-content">
            <div class="tab-pane fade show active" id="profile">
                <p>Manage your profile settings.</p>
                <a href="{{ url_for('members.profile') }}" class="btn btn-primary">Edit Profile</a>
            </div>
            <div class="tab-pane fade" id="security">
                <p>Change password and security settings.</p>
            </div>
            <div class="tab-pane fade" id="notifications">
                <p>Manage email preferences.</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
